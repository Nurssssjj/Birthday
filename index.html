<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@300;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {--primary:#ff4081; --accent:#9c27b0;}
body {
    margin:0;
    font-family:'Roboto',sans-serif;
    background:#000;
    color:white;
    overflow:hidden;
    text-align:center;
    cursor:crosshair;
    touch-action: none; /* Предотвращаем стандартные свайпы браузера */
}

.sparkle {position:absolute;width:4px;height:4px;border-radius:50%;background:white;pointer-events:none;box-shadow:0 0 10px white,0 0 20px var(--primary);animation:fly 1s ease-out forwards;}
@keyframes fly {0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}

button {
    padding:15px 35px;
    font-size:16px;
    font-weight:bold;
    color:white;
    background:linear-gradient(45deg,var(--primary),var(--accent));
    border:none;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,64,129,0.4);
    transition:all 0.3s ease;
    text-transform:uppercase;
    letter-spacing:1px;
    position:relative;
    z-index: 10;
}
button:active {transform:scale(0.95);}

.screen {
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100vw;
    height:100vh;
    position:absolute;
    top:0;
    left:0;
    opacity:0;
    transition:all 0.8s ease;
    pointer-events:none;
    padding: 20px;
    box-sizing: border-box;
}
.screen.active {opacity:1;z-index:2;pointer-events:auto;}

.photo {
    width:80vw;
    height:auto;
    aspect-ratio: 2/3;
    max-height: 55vh;
    border-radius: 15px;
    border: 2px solid rgba(255,255,255,0.2);
    object-fit: cover;
    box-shadow: 0 0 30px rgba(255,64,129,0.3);
}

#wishInput {
    padding:15px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.3);
    width:90%;
    max-width:300px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    color:white;
    text-align:center;
    font-size:18px;
    margin:20px 0;
    outline:none;
}

.rainbow-text {
    font-family:'Pacifico';
    background:linear-gradient(to right,#ff4081,#ffeb3b,#00e676,#2979ff,#ff4081);
    background-size:200% auto;
    color:transparent;
    -webkit-background-clip:text;
    background-clip:text;
    animation:shine 3s linear infinite;
    width: 100%;
}
@keyframes shine {to {background-position:200% center;}}

.circle-photo {
    position:absolute;
    width:80px; 
    height:110px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid white;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    opacity:0;
    transition:all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#matrix-canvas,#hearts-canvas,#confetti-final {position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}

h1 { font-size: 40px !important; margin: 10px 0; }
h2 { font-size: 28px !important; }

#countdown-number {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:120px;
    color:#0F0;
    font-family:'Playfair Display';
    z-index:100;
}
</style>
</head>
<body onmousemove="createSparkle(event)" ontouchmove="createSparkleTouch(event)">

<audio id="bgMusic" src="music.mp3" loop></audio>
<audio id="fireworkSound" src="firework.mp3"></audio>
<canvas id="hearts-canvas"></canvas>
<canvas id="matrix-canvas"></canvas>
<canvas id="confetti-final"></canvas>

<div id="countdown-number" style="display:none;"></div>

<div id="screen1" class="screen active">
  <h1 class="rainbow-text">С днем рождения, Красотка</h1>
  <button onclick="preStart()">Начать путешествие</button>
</div>

<div id="screen2" class="screen">
  <div id="photoText" class="rainbow-text" style="font-size:24px;margin-bottom:20px;"></div>
  <img id="photo" class="photo" src="" alt="">
</div>

<div id="screen3" class="screen">
  <h2 class="rainbow-text">Загадай желание...</h2>
  <input type="text" id="wishInput" placeholder="Мечтай смелее!">
  <br>
  <button onclick="saveWish()">Отправить в космос</button>
</div>

<div id="screen4" class="screen">
  <h1 id="finalText" class="rainbow-text" style="font-size:32px !important;">С Твоим Днем! 💖</h1>
  <div id="finalCircle" style="position:relative;width:100%;height:40vh;margin: 20px 0;"></div>
  <div id="bigHeart" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;color:#ff4081;text-shadow:0 0 20px #ff79b0;opacity:0;z-index:10;">❤️</div>
  <button onclick="location.reload()">Еще раз ✨</button>
</div>

<script>
const photos=[
  {src:'photo1.jpg',text:'Ты — само совершенство 🌸'},
  {src:'photo2.jpg',text:'Твоя улыбка лечит ✨'},
  {src:'photo3.jpg',text:'Сияй, как самая яркая звезда 💛'},
  {src:'photo4.jpg',text:'Мир прекраснее с тобой 💐'},
  {src:'photo5.jpg',text:'Будь всегда такой нежной 🌷'},
  {src:'photo6.jpg',text:'Твори, люби, будь счастлива! 🌟'}
];
let photoIndex=0;

// Функция вибрации (Android)
function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

function createSparkleTouch(e) {
    const touch = e.touches[0];
    createSparkle({pageX: touch.pageX, pageY: touch.pageY});
}

function createSparkle(e){
  for(let i=0;i<2;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left=e.pageX+'px';
    s.style.top=e.pageY+'px';
    const dx=(Math.random()-0.5)*80;
    const dy=(Math.random()-0.5)*80;
    s.style.setProperty('--dx',dx+'px');
    s.style.setProperty('--dy',dy+'px');
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function preStart(){
  document.getElementById('screen1').classList.remove('active');
  const mCanvas=document.getElementById('matrix-canvas');
  const cNumber=document.getElementById('countdown-number');
  mCanvas.style.display='block';
  cNumber.style.display='block';
  
  document.getElementById('bgMusic').play().catch(()=>{});
  startMatrix();

  let count=3;
  cNumber.innerText=count;
  const timer=setInterval(()=>{
    count--;
    vibrate(50); // Вибрация на каждый тик отсчета
    if(count>0)cNumber.innerText=count;
    else{
      clearInterval(timer);
      mCanvas.style.display='none';
      cNumber.style.display='none';
      document.getElementById('screen2').classList.add('active');
      showPhotos();
    }
  },1000);
}

function showPhotos(){
  if(photoIndex>=photos.length){
    document.getElementById('screen2').classList.remove('active');
    document.getElementById('screen3').classList.add('active');
    return;
  }
  const img=document.getElementById('photo');
  const txt=document.getElementById('photoText');
  img.src=photos[photoIndex].src;
  txt.innerText=photos[photoIndex].text;
  setTimeout(()=>{
    photoIndex++;
    showPhotos();
  },3500);
}

function saveWish(){
  document.getElementById('screen3').classList.remove('active');
  document.getElementById('screen4').classList.add('active');
  const container=document.getElementById('finalCircle');
  const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
  
  photos.forEach((p,i)=>{
    const img=document.createElement('img');
    img.src=p.src;
    img.className='circle-photo';
    const angle=(i/photos.length)*Math.PI*2;
    const x=Math.cos(angle)*radius;
    const y=Math.sin(angle)*radius;
    setTimeout(()=>{
      img.style.left=`calc(50% + ${x}px - 40px)`;
      img.style.top=`calc(50% + ${y}px - 55px)`;
      img.style.opacity='1';
      img.style.transform=`rotate(${angle * 10}deg) scale(1)`;
      vibrate(30); // Легкий отклик при появлении фото
    },i*250);
    container.appendChild(img);
  });
  setTimeout(showFinalEffects, photos.length*250+500);
}

function showFinalEffects(){
  const text=document.getElementById('finalText');
  text.style.textShadow='0 0 20px #ff4081, 0 0 40px #ff79b0';
  
  const heart=document.getElementById('bigHeart');
  heart.style.transition='all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  heart.style.opacity='1';
  heart.style.transform='translate(-50%,-50%) scale(1.2)';
  
  // Взрывной отклик
  vibrate([100, 50, 100]);

  const firework=document.getElementById('fireworkSound');
  firework.volume=0.4;
  firework.play().catch(()=>{});

  // Эффект сердцебиения телефона
  setInterval(() => {
    heart.style.transform = 'translate(-50%,-50%) scale(1.3)';
    vibrate(20); 
    setTimeout(() => {
        heart.style.transform = 'translate(-50%,-50%) scale(1.1)';
    }, 150);
  }, 1000);

  const c=document.getElementById('confetti-final');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;
  c.height=window.innerHeight;
  const pieces=[];
  for(let i=0;i<100;i++){
    pieces.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*4+2,dx:(Math.random()-0.5)*3,dy:Math.random()*3+2,color:`hsl(${Math.random()*360},100%,50%)`});
  }
  function drawConfetti(){
    ctx.clearRect(0,0,c.width,c.height);
    for(let p of pieces){
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      if(p.y>c.height)p.y=-10;
    }
    requestAnimationFrame(drawConfetti);
  }
  drawConfetti();
}

const hCanvas=document.getElementById('hearts-canvas');
const hCtx=hCanvas.getContext('2d');
hCanvas.width=window.innerWidth;
hCanvas.height=window.innerHeight;
let hearts=Array(30).fill().map(()=>({x:Math.random()*hCanvas.width,y:Math.random()*hCanvas.height,s:Math.random()*8+4,sp:Math.random()+0.3}));
function drawHearts(){
  hCtx.clearRect(0,0,hCanvas.width,hCanvas.height);
  hCtx.fillStyle='rgba(255,64,129,0.3)';
  hearts.forEach(h=>{
    hCtx.beginPath();
    hCtx.arc(h.x,h.y,h.s,0,Math.PI*2);
    hCtx.fill();
    h.y+=h.sp;
    if(h.y>hCanvas.height) h.y=-10;
  });
  requestAnimationFrame(drawHearts);
}
drawHearts();

function startMatrix(){
  const c=document.getElementById('matrix-canvas');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;
  c.height=window.innerHeight;
  const columns=Math.floor(c.width/20);
  const drops=Array(columns).fill(1);
  const matrixInterval = setInterval(()=>{
    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle="#0F0";
    ctx.font="15px monospace";
    drops.forEach((y,i)=>{
      ctx.fillText(Math.floor(Math.random()*2),i*20,y*20);
      if(y*20>c.height && Math.random()>0.975)drops[i]=0;
      drops[i]++;
    });
  },50);
  setTimeout(() => clearInterval(matrixInterval), 3000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@300;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {--primary:#ff4081;--accent:#9c27b0;}
body{margin:0;font-family:'Roboto',sans-serif;background:#000;color:white;overflow:hidden;text-align:center;cursor:crosshair;}
.sparkle{position:absolute;width:4px;height:4px;border-radius:50%;background:white;pointer-events:none;box-shadow:0 0 10px white,0 0 20px var(--primary);animation:fly 1s ease-out forwards;}
@keyframes fly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
button{padding:18px 50px;font-size:18px;font-weight:bold;color:white;background:linear-gradient(45deg,var(--primary),var(--accent));border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 20px rgba(255,64,129,0.4);transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);text-transform:uppercase;letter-spacing:2px;position:relative;overflow:hidden;}
button:hover{transform:scale(1.1);box-shadow:0 0 40px var(--primary);}
.screen{display:flex;flex-direction:column;justify-content:center;align-items:center;width:100vw;height:100vh;position:absolute;top:0;left:0;opacity:0;transition:all 1.2s ease;pointer-events:none;}
.screen.active{opacity:1;z-index:2;pointer-events:auto;}
.photo{width:30vw;height:45vw;max-height:60vh;border-radius:20px;border:2px solid rgba(255,255,255,0.2);object-fit:cover;box-shadow:0 0 50px rgba(255,64,129,0.3);transition:transform 0.2s ease-out;}
#wishInput{padding:15px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);width:350px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);color:white;text-align:center;font-size:20px;margin:20px 0;outline:none;}
.rainbow-text{font-family:'Pacifico';background:linear-gradient(to right,#ff4081,#ffeb3b,#00e676,#2979ff,#ff4081);background-size:200% auto;color:transparent;-webkit-background-clip:text;background-clip:text;animation:shine 3s linear infinite;}
@keyframes shine{to{background-position:200% center;}}
.circle-photo{position:absolute;width:140px;height:190px;object-fit:cover;border-radius:15px;border:3px solid white;box-shadow:0 10px 30px rgba(0,0,0,0.5);opacity:0;transition:all 1s cubic-bezier(0.68,-0.55,0.265,1.55);}
#matrix-canvas,#hearts-canvas,#confetti-final{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
@media(max-width:768px){
  .photo{width:60vw;height:90vw;}
  #photoText{font-size:25px !important;}
  #wishInput{width:80%;font-size:18px;}
  #finalText{font-size:40px !important;}
  button{padding:15px 30px;font-size:16px;}
}
</style>
</head>
<body onmousemove="createSparkle(event)">

<audio id="bgMusic" src="music.mp3" loop></audio>

<canvas id="hearts-canvas"></canvas>
<canvas id="matrix-canvas"></canvas>
<canvas id="confetti-final"></canvas>

<div id="countdown-number" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:200px;color:#0F0;font-family:'Playfair Display';z-index:100;"></div>

<div id="screen1" class="screen active">
  <h1 class="rainbow-text" style="font-size:70px;">Для тебя...</h1>
  <button onclick="preStart()">Начать путешествие</button>
</div>

<div id="screen2" class="screen">
  <div id="photoText" class="rainbow-text" style="font-size:40px;margin-bottom:20px;"></div>
  <img id="photo" class="photo" src="" alt="">
</div>

<div id="screen3" class="screen">
  <h2 class="rainbow-text" style="font-size:40px;">Загадай желание...</h2>
  <input type="text" id="wishInput" placeholder="Мечтай смелее!"><br>
  <button onclick="saveWish()">Отправить в космос</button>
</div>

<div id="screen4" class="screen">
  <h1 id="finalText" class="rainbow-text" style="font-size:60px;">С Твоим Днем! 💖</h1>
  <div id="finalCircle" style="position:relative;width:100%;height:50vh;"></div>
  <div id="bigHeart" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:150px;color:#ff4081;text-shadow:0 0 30px #ff79b0;opacity:0;z-index:10;">❤️</div>
  <button onclick="location.reload()">Еще раз ✨</button>
</div>

<script>
// весь твой JS здесь, только убираем fireworkSound
</script>
</body>
</html>
